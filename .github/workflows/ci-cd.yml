name: CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: pip install -r requirements-prod.txt requests
    
    - name: Start API
      run: |
        uvicorn src.serving.app:app --host 0.0.0.0 --port 8000 &
        sleep 10
    
    - name: Test endpoints
      run: |
        curl -f http://localhost:8000/health
        curl -f http://localhost:8000/model/info

  docker:
    needs: test
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Build Docker image
      run: docker build -t churn-api .
    
    - name: Test container
      run: |
        docker run -d -p 8000:8000 --name test churn-api
        sleep 10
        curl -f http://localhost:8000/health
        docker stop test